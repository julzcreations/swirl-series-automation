name: Swirl Series Sync

on:
  schedule:
    # 18:45 UTC = 1:45pm CDT (summer) / 12:45pm CST (winter), Mon/Wed/Fri.
    # Pushed later than posting time so a freshly-posted reel is in IG Graph
    # before the sync pulls metrics; prevents analyzing a pre-post state.
    # The script gates script-generation to weekday() in {0,2,4} (Mon/Wed/Fri).
    # Metrics refresh + frame analysis + reconciliation run on every fired run.
    - cron: '45 18 * * 1,3,5'
  workflow_dispatch:
    inputs:
      force_regen:
        description: 'Force script generation even on non-gen days (true/false)'
        required: false
        default: 'false'
        type: string
      target_media_id:
        description: 'Optional: narrow this run to a single IG media ID (for off-script reprocessing)'
        required: false
        default: ''
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install gh CLI
        run: |
          if ! command -v gh &>/dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli-stable.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh
          fi

      - name: Run sync
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANALYST_MODEL: claude-sonnet-4-6
          WRITER_MODEL: claude-sonnet-4-6
          VISION_MODEL: claude-haiku-4-5-20251001
          FORCE_REGEN: ${{ inputs.force_regen || 'false' }}
          TARGET_MEDIA_ID: ${{ inputs.target_media_id || '' }}
          MAX_COST_PER_RUN_USD: '2.00'
          # gh CLI needs auth to update the IG_TOKEN secret on auto-refresh.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # JulzOps ops dashboard ingest. Missing secrets = no-op, never fails the run.
          JULZOPS_INGEST_URL: ${{ secrets.JULZOPS_INGEST_URL }}
          JULZOPS_INGEST_SECRET: ${{ secrets.JULZOPS_INGEST_SECRET }}
        run: python sync.py
