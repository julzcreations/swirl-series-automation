name: Swirl Series Sync

on:
  schedule:
    # Daily at 15:00 UTC (= 10am CST / 11am CDT). The script itself gates
    # script-generation to Mon/Wed/Sat; metrics refresh and frame analysis
    # run every day so engagement numbers stay fresh and new posts get
    # analyzed promptly.
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      force_script_gen:
        description: 'Force script generation even on non-gen days (true/false)'
        required: false
        default: 'false'
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANALYST_MODEL: claude-opus-4-6
          WRITER_MODEL: claude-sonnet-4-6
          VISION_MODEL: claude-sonnet-4-6
          FORCE_SCRIPT_GEN: ${{ inputs.force_script_gen || 'false' }}
        run: python sync.py
